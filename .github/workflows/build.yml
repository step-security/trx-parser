name: Build

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
jobs:
  build:
    name: Build and Package
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ${{ github.actor == 'dependabot[bot]' && fromJSON('["ubuntu-latest"]') || fromJSON('["ubuntu-latest", "windows-latest"]') }}
        node-version: [24]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build TypeScript
        run: npm run build

      - name: Package for distribution
        run: npm run package

      - name: Check dist directory
        run: |
          if [ ! -f dist/index.js ]; then
            echo "dist/index.js was not found in the expected location"
            exit 1
          fi
        shell: bash

